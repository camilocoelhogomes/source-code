# E2E stack for T21 (Robot) and CI — Podman-compatible (REQ-043, DEC-018).
# Primary platform: linux/amd64 (ENG-006).
# Ownership of runtime proof: T21 — this file is manifesto/delivery only (REQ-044).
# ENG-009: never mount a host virtualenv into the app service.
name: github-rag-e2e

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: github_rag
      POSTGRES_PASSWORD: github_rag
      POSTGRES_DB: github_rag
    volumes:
      - e2e_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U github_rag -d github_rag"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.13.2
    volumes:
      - e2e_qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"

  zoekt:
    image: sourcegraph/zoekt:latest
    command: ["zoekt-webserver", "-index", "/data/index", "-rpc"]
    volumes:
      - e2e_zoekt_index:/data/index
    environment:
      ZOEKT_INDEX_DIR: /data/index
    ports:
      - "6070:6070"

  slm:
    image: ollama/ollama:latest
    volumes:
      - e2e_slm_data:/root/.ollama
    ports:
      - "11434:11434"

  app:
    build:
      context: .
      platforms:
        - linux/amd64
    platform: linux/amd64
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      zoekt:
        condition: service_started
      slm:
        condition: service_started
    ports:
      - "8080:8080"
      - "8001:8001"
    environment:
      CONFIG_PATH: /config/config.json
      DATABASE_URL: postgresql+psycopg://github_rag:github_rag@postgres:5432/github_rag
      ZOEKT_URL: http://zoekt:6070
      ZOEKT_INDEX_DIR: /data/index
      QDRANT_URL: http://qdrant:6333
      OPENAI_BASE_URL: http://slm:11434/v1
      OPENAI_API_KEY: local
      SLM_MODEL: qwen2.5-coder:3b
      UI_HOST: 0.0.0.0
      UI_PORT: "8080"
      MCP_PORT: "8001"
      MCP_TRANSPORT: sse
      INDEX_WORKERS: "2"
      QUERY_WORKERS: "4"
      INDEX_CRON: "0 2 * * *"
      # CI may set E2E_GITHUB_TOKEN; local HITL may set GITHUB_TOKEN (DEC-020).
      GITHUB_TOKEN: ${E2E_GITHUB_TOKEN:-${GITHUB_TOKEN:-}}
    volumes:
      - ${HOST_CONFIG:-./examples/config.json}:/config/config.json:ro
      - ${HOST_REPOS:-./repos}:/repos:ro
      - e2e_zoekt_index:/data/index
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz')\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

volumes:
  e2e_pg_data:
  e2e_qdrant_data:
  e2e_zoekt_index:
  e2e_slm_data:
