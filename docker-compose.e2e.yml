# E2E infra stack (T21 Robot) — Podman-compatible (REQ-043, DEC-018).
# App roda no host durante e2e local (sem rebuild de imagem):
#   python -m github_rag.e2e  → compose dev/e2e + app host + Robot
# CI/produção: use docker-compose.yml (app em container).
# ENG-009: never mount a host virtualenv into containers.
name: github-rag-e2e

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: github_rag
      POSTGRES_PASSWORD: github_rag
      POSTGRES_DB: github_rag
    ports:
      - "5432:5432"
    volumes:
      - e2e_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U github_rag -d github_rag"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.13.2
    volumes:
      - e2e_qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"

  zoekt:
    image: sourcegraph/zoekt:latest
    command: ["zoekt-webserver", "-index", "/data/index", "-rpc"]
    volumes:
      - ${ZOEKT_INDEX_HOST:-./.data/e2e-zoekt-index}:/data/index
    environment:
      ZOEKT_INDEX_DIR: /data/index
    ports:
      - "6070:6070"

  slm:
    image: ollama/ollama:latest
    volumes:
      - e2e_slm_data:/root/.ollama
    ports:
      - "11434:11434"

volumes:
  e2e_pg_data:
  e2e_qdrant_data:
  e2e_slm_data:
