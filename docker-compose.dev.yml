# Local development stack (REQ-043). Primary platform: linux/amd64 (ENG-006).
# Mounts ./src for iteration; never mount a host .venv (ENG-009).
name: github-rag-dev

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: github_rag
      POSTGRES_PASSWORD: github_rag
      POSTGRES_DB: github_rag
    ports:
      - "5432:5432"
    volumes:
      - dev_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U github_rag -d github_rag"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.13.2
    volumes:
      - dev_qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"

  zoekt:
    image: sourcegraph/zoekt:latest
    volumes:
      - dev_zoekt_index:/data/index
    environment:
      ZOEKT_INDEX_DIR: /data/index
    ports:
      - "6070:6070"

  slm:
    image: ollama/ollama:latest
    volumes:
      - dev_slm_data:/root/.ollama
    ports:
      - "11434:11434"

  app:
    build:
      context: .
      platforms:
        - linux/amd64
    platform: linux/amd64
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      zoekt:
        condition: service_started
      slm:
        condition: service_started
    ports:
      - "8080:8080"
      - "8001:8001"
    environment:
      CONFIG_PATH: /config/config.json
      DATABASE_URL: postgresql+psycopg://github_rag:github_rag@postgres:5432/github_rag
      ZOEKT_URL: http://zoekt:6070
      ZOEKT_INDEX_DIR: /data/index
      QDRANT_URL: http://qdrant:6333
      OPENAI_BASE_URL: http://slm:11434/v1
      OPENAI_API_KEY: local
      SLM_MODEL: qwen2.5-coder:3b
      UI_HOST: 0.0.0.0
      UI_PORT: "8080"
      MCP_PORT: "8001"
      MCP_TRANSPORT: sse
      INDEX_WORKERS: "2"
      QUERY_WORKERS: "4"
      INDEX_CRON: "0 2 * * *"
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    volumes:
      - ${HOST_CONFIG:-./examples/config.json}:/config/config.json:ro
      - ${HOST_REPOS:-./repos}:/repos:ro
      - ./src:/app/src
      - ./web:/app/web
      - dev_zoekt_index:/data/index
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz')\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

volumes:
  dev_pg_data:
  dev_qdrant_data:
  dev_zoekt_index:
  dev_slm_data:
